name: 📊 Monitor de APIs - Unimed RV

on:
  schedule:
    - cron: '*/15 * * * *'  # A cada 15 minutos
  workflow_dispatch:  # Permite execução manual

jobs:
  monitor:
    name: 🔍 Verificar APIs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Verificar API Calendário
        id: check_calendario
        continue-on-error: true
        run: |
          echo "🔍 Verificando API Calendário..."
          curl -s -o /dev/null -w "%{http_code}" https://web-apitarefas.up.railway.app/prestadores \
            -H "x-token: ${{ secrets.API_TOKEN }}" \
            | tee status_calendario.txt
          if [ $(cat status_calendario.txt) -eq 200 ]; then
            echo "✅ API Calendário OK"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "❌ API Calendário falhou"
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Verificar API Tarefas
        id: check_tarefas
        continue-on-error: true
        run: |
          echo "🔍 Verificando API Tarefas..."
          curl -s -o /dev/null -w "%{http_code}" https://web-apitarefas.up.railway.app/tarefas-app/usuarios \
            -H "x-token: ${{ secrets.API_TOKEN_TAREFAS }}" \
            | tee status_tarefas.txt
          if [ $(cat status_tarefas.txt) -eq 200 ]; then
            echo "✅ API Tarefas OK"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "❌ API Tarefas falhou"
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Verificar Banco Neon
        id: check_neon
        continue-on-error: true
        run: |
          echo "🔍 Verificando conexão com Neon..."
          # Usa o endpoint de health check da API
          curl -s -o /dev/null -w "%{http_code}" https://web-apitarefas.up.railway.app/health \
            | tee status_neon.txt
          if [ $(cat status_neon.txt) -eq 200 ]; then
            echo "✅ Neon OK"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "❌ Neon falhou"
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Criar Relatório
        id: relatorio
        run: |
          echo "# 📊 Relatório de Monitoramento das APIs" > report.md
          echo "" >> report.md
          echo "## 📅 Data e Hora" >> report.md
          echo "$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')" >> report.md
          echo "" >> report.md
          
          echo "## 📊 Status das APIs" >> report.md
          echo "" >> report.md
          
          if [ "${{ steps.check_calendario.outputs.status }}" == "ok" ]; then
            echo "✅ **API Calendário:** Online" >> report.md
          else
            echo "❌ **API Calendário:** Offline" >> report.md
          fi
          
          if [ "${{ steps.check_tarefas.outputs.status }}" == "ok" ]; then
            echo "✅ **API Tarefas:** Online" >> report.md
          else
            echo "❌ **API Tarefas:** Offline" >> report.md
          fi
          
          if [ "${{ steps.check_neon.outputs.status }}" == "ok" ]; then
            echo "✅ **Banco Neon:** Conectado" >> report.md
          else
            echo "❌ **Banco Neon:** Desconectado" >> report.md
          fi
          
          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md
          echo "🔄 Próxima verificação em 15 minutos" >> report.md

      - name: 📤 Upload do Relatório
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report
          path: report.md
          retention-days: 7

      - name: 📨 Criar Issue se alguma API falhar
        if: steps.check_calendario.outputs.status != 'ok' || steps.check_tarefas.outputs.status != 'ok' || steps.check_neon.outputs.status != 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            
            const title = `🚨 Falha no Monitoramento - ${new Date().toLocaleDateString('pt-BR')}`;
            const body = report;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['monitoring', 'bug']
            });