name: "🚨 Monitor de APIs - Unimed RV"

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 */3 * * *'   # A cada 3 horas
  workflow_dispatch:         # Execução manual

env:
  TZ: America/Sao_Paulo

jobs:
  monitor:
    name: "Verificar APIs"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "📦 Instalar jq"
        run: sudo apt-get update && sudo apt-get install -y jq

      # =================================================================
      # VERIFICAÇÃO DAS APIS
      # =================================================================
      - name: "🔍 Verificar API Calendario"
        id: check_calendario
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/calendario-app/prestadores \
            -H "x-token: ${{ secrets.API_TOKEN }}" \
            --max-time 10)
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          [ "$HTTP_CODE" -eq 200 ] && echo "status=ok" >> $GITHUB_OUTPUT || echo "status=error" >> $GITHUB_OUTPUT

      - name: "🔍 Verificar API Tarefas"
        id: check_tarefas
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/tarefas-app/usuarios \
            -H "x-token: ${{ secrets.API_TOKEN_TAREFAS }}" \
            --max-time 10)
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          [ "$HTTP_CODE" -eq 200 ] && echo "status=ok" >> $GITHUB_OUTPUT || echo "status=error" >> $GITHUB_OUTPUT

      - name: "🔍 Verificar Banco Neon"
        id: check_neon
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/ \
            --max-time 10)
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          [ "$HTTP_CODE" -eq 200 ] && echo "status=ok" >> $GITHUB_OUTPUT || echo "status=error" >> $GITHUB_OUTPUT

      # =================================================================
      # RELATÓRIO (sempre gera, mas só envia se houver falha)
      # =================================================================
      - name: "📝 Verificar se há falhas"
        id: check_falhas
        run: |
          CAL_S="${{ steps.check_calendario.outputs.status }}"
          TAR_S="${{ steps.check_tarefas.outputs.status }}"
          NEO_S="${{ steps.check_neon.outputs.status }}"

          if [ "$CAL_S" != "ok" ] || [ "$TAR_S" != "ok" ] || [ "$NEO_S" != "ok" ]; then
            echo "tem_falha=true" >> $GITHUB_OUTPUT
            echo "❌ Falha detectada!"
          else
            echo "tem_falha=false" >> $GITHUB_OUTPUT
            echo "✅ Tudo OK — nenhuma notificação necessária."
          fi

      # =================================================================
      # TELEGRAM — só envia se houver falha, e apenas UMA mensagem
      # =================================================================
      - name: "📨 Notificar falha no Telegram"
        if: steps.check_falhas.outputs.tem_falha == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')

          CAL_S="${{ steps.check_calendario.outputs.status }}"
          TAR_S="${{ steps.check_tarefas.outputs.status }}"
          NEO_S="${{ steps.check_neon.outputs.status }}"
          CAL_C="${{ steps.check_calendario.outputs.status_code }}"
          TAR_C="${{ steps.check_tarefas.outputs.status_code }}"
          NEO_C="${{ steps.check_neon.outputs.status_code }}"

          [ "$CAL_S" == "ok" ] && CAL_L="✅ OK" || CAL_L="❌ FALHA (HTTP $CAL_C)"
          [ "$TAR_S" == "ok" ] && TAR_L="✅ OK" || TAR_L="❌ FALHA (HTTP $TAR_C)"
          [ "$NEO_S" == "ok" ] && NEO_L="✅ OK" || NEO_L="❌ FALHA (HTTP $NEO_C)"

          MSG=$(cat << EOF
          🚨 *ALERTA — API UNIMED RV*
          ━━━━━━━━━━━━━━━━━━━━
          📅 $TIMESTAMP

          📊 *Status das APIs:*
          🗓️ Calendário: $CAL_L
          ✅ Tarefas: $TAR_L
          🗄️ Banco Neon: $NEO_L
          ━━━━━━━━━━━━━━━━━━━━
          ⚠️ Verifique o Railway para mais detalhes.
          EOF
          )

          JSON=$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$MSG" \
            '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON" --max-time 10)

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Alerta enviado!"
          else
            echo "❌ Falha ao enviar alerta: $RESPONSE"
          fi

      # =================================================================
      # ISSUE — só cria se houver falha
      # =================================================================
      - name: "📝 Criar ou atualizar Issue"
        if: steps.check_falhas.outputs.tem_falha == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            const today = new Date().toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });

            const cal = '${{ steps.check_calendario.outputs.status }}' === 'ok' ? '✅ OK' : '❌ FALHA (${{ steps.check_calendario.outputs.status_code }})';
            const tar = '${{ steps.check_tarefas.outputs.status }}' === 'ok' ? '✅ OK' : '❌ FALHA (${{ steps.check_tarefas.outputs.status_code }})';
            const neo = '${{ steps.check_neon.outputs.status }}' === 'ok' ? '✅ OK' : '❌ FALHA (${{ steps.check_neon.outputs.status_code }})';

            const body = `## 🚨 Falha Detectada\n\n**📅 Data:** ${now}\n\n| API | Status |\n|-----|--------|\n| Calendário | ${cal} |\n| Tarefas | ${tar} |\n| Banco Neon | ${neo} |\n\n🔗 [Ver execução](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring'
            });

            if (issues.length === 0) {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Falha nas APIs - ${today}`,
                body,
                labels: ['monitoring', 'bug']
              });
              console.log(`Issue criada: #${issue.number}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `🔄 **Nova falha em:** ${now}\n\n${body}`
              });
              console.log(`Comentário adicionado à issue #${issues[0].number}`);
            }