name: 📊 Monitor de APIs - Unimed RV

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read
  checks: read
  deployments: read
  packages: read
  pages: read
  repository-projects: read
  security-events: read
  statuses: read

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  TZ: America/Sao_Paulo

jobs:
  monitor:
    name: 🔍 Verificar APIs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # =================================================================
      # VERIFICAÇÃO DAS APIS
      # =================================================================

      - name: 🔍 Verificar API Calendario
        id: check_calendario
        continue-on-error: true
        run: |
          echo "Verificando API Calendario..."

          # ✅ CORRIGIDO: adicionado prefixo /calendario-app
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/calendario-app/prestadores \
            -H "x-token: ${{ secrets.API_TOKEN }}" \
            --max-time 10)

          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "API Calendario OK (200)"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "API Calendario falhou ($HTTP_CODE)"
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Verificar API Tarefas
        id: check_tarefas
        continue-on-error: true
        run: |
          echo "Verificando API Tarefas..."

          # /tarefas-app/usuarios ja tem o prefixo correto
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/tarefas-app/usuarios \
            -H "x-token: ${{ secrets.API_TOKEN_TAREFAS }}" \
            --max-time 10)

          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "API Tarefas OK (200)"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "API Tarefas falhou ($HTTP_CODE)"
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Verificar Banco Neon (via API root)
        id: check_neon
        continue-on-error: true
        run: |
          echo "Verificando conexao com Neon..."

          # ✅ CORRIGIDO: usa a rota / (root) que sempre responde 200
          # A rota /health nao existe na API
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/ \
            --max-time 10)

          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Neon OK (200)"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "Neon falhou ($HTTP_CODE)"
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      # =================================================================
      # RELATORIO
      # =================================================================

      - name: 📝 Criar Relatorio
        id: relatorio
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')

          if [ "${{ steps.check_calendario.outputs.status }}" == "ok" ]; then
            CALENDARIO_STATUS="Online"
            CALENDARIO_EMOJI="OK"
          else
            CALENDARIO_STATUS="Offline"
            CALENDARIO_EMOJI="ERRO"
          fi

          if [ "${{ steps.check_tarefas.outputs.status }}" == "ok" ]; then
            TAREFAS_STATUS="Online"
            TAREFAS_EMOJI="OK"
          else
            TAREFAS_STATUS="Offline"
            TAREFAS_EMOJI="ERRO"
          fi

          if [ "${{ steps.check_neon.outputs.status }}" == "ok" ]; then
            NEON_STATUS="Conectado"
            NEON_EMOJI="OK"
          else
            NEON_STATUS="Desconectado"
            NEON_EMOJI="ERRO"
          fi

          if [ "$CALENDARIO_EMOJI" == "ERRO" ] || [ "$TAREFAS_EMOJI" == "ERRO" ] || [ "$NEON_EMOJI" == "ERRO" ]; then
            STATUS_GERAL="FALHA DETECTADA"
          else
            STATUS_GERAL="TUDO OK"
          fi

          cat > report.md << EOF
          # Relatorio de Monitoramento das APIs
          ## Data e Hora
          $TIMESTAMP
          ## Status das APIs
          | API | Status | Codigo |
          |-----|--------|--------|
          | API Calendario | $CALENDARIO_STATUS | ${{ steps.check_calendario.outputs.status_code }} |
          | API Tarefas    | $TAREFAS_STATUS    | ${{ steps.check_tarefas.outputs.status_code }} |
          | Banco Neon     | $NEON_STATUS       | ${{ steps.check_neon.outputs.status_code }} |
          ## Resumo
          $STATUS_GERAL
          ---
          Proxima verificacao em 15 minutos
          EOF

          echo "status_geral=$STATUS_GERAL" >> $GITHUB_OUTPUT
          cat report.md

      - name: 📤 Upload do Relatorio
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report-${{ github.run_id }}
          path: report.md
          retention-days: 30

      # =================================================================
      # NOTIFICACOES TELEGRAM
      # =================================================================

      - name: 🤖 Preparar mensagem para Telegram
        id: prepare_telegram
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')

          CAL_STATUS="${{ steps.check_calendario.outputs.status }}"
          TAR_STATUS="${{ steps.check_tarefas.outputs.status }}"
          NEON_STATUS="${{ steps.check_neon.outputs.status }}"

          if [ "$CAL_STATUS" == "ok" ]; then CAL_EMOJI="OK"; else CAL_EMOJI="ERRO"; fi
          if [ "$TAR_STATUS" == "ok" ]; then TAR_EMOJI="OK"; else TAR_EMOJI="ERRO"; fi
          if [ "$NEON_STATUS" == "ok" ]; then NEON_EMOJI="OK"; else NEON_EMOJI="ERRO"; fi

          if [ "$CAL_STATUS" != "ok" ] || [ "$TAR_STATUS" != "ok" ] || [ "$NEON_STATUS" != "ok" ]; then
            TITULO="ALERTA: Falha no Monitoramento"
          else
            TITULO="Monitoramento OK"
          fi

          MSG="$TITULO%0A%0A"
          MSG="${MSG}Data: $TIMESTAMP%0A%0A"
          MSG="${MSG}Status das APIs:%0A%0A"
          MSG="${MSG}[$CAL_EMOJI] API Calendario: $CAL_STATUS (codigo: ${{ steps.check_calendario.outputs.status_code }})%0A"
          MSG="${MSG}[$TAR_EMOJI] API Tarefas: $TAR_STATUS (codigo: ${{ steps.check_tarefas.outputs.status_code }})%0A"
          MSG="${MSG}[$NEON_EMOJI] Banco Neon: $NEON_STATUS (codigo: ${{ steps.check_neon.outputs.status_code }})%0A%0A"
          MSG="${MSG}Proxima verificacao em 15 minutos."

          echo "TELEGRAM_MSG=$MSG" >> $GITHUB_ENV

      - name: 🤖 Enviar notificacao para Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_TOKEN ou TELEGRAM_CHAT_ID nao configurados"
            exit 0
          fi

          echo "Enviando notificacao para Telegram..."

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TELEGRAM_MSG}" \
            --max-time 10)

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Notificacao enviada com sucesso"
          else
            echo "Falha ao enviar notificacao"
            echo "$RESPONSE"
          fi

      - name: 🤖 Verificar se grupo esta configurado
        id: check_group
        run: |
          if [ -n "${{ secrets.TELEGRAM_GROUP_ID }}" ]; then
            echo "group_configured=true" >> $GITHUB_OUTPUT
          else
            echo "group_configured=false" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Enviar notificacao para grupo
        if: steps.check_group.outputs.group_configured == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_GROUP_ID}" \
            --data-urlencode "text=${TELEGRAM_MSG}" \
            --max-time 10)

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Notificacao enviada para o grupo"
          else
            echo "Falha ao enviar para o grupo"
          fi

      # =================================================================
      # CRIACAO DE ISSUE (APENAS SE FALHAR)
      # =================================================================

      - name: 📨 Criar Issue se alguma API falhar
        if: steps.check_calendario.outputs.status != 'ok' || steps.check_tarefas.outputs.status != 'ok' || steps.check_neon.outputs.status != 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            const today = new Date().toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            const title = `Falha no Monitoramento - ${today}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring'
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: report,
                labels: ['monitoring', 'bug']
              });
              console.log('Issue criada com sucesso');
            } else {
              console.log('Ja existe uma issue aberta para monitoramento');
            }