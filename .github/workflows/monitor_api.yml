name: "Monitor de APIs - Unimed RV"

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read
  checks: read
  deployments: read
  packages: read
  pages: read
  repository-projects: read
  security-events: read
  statuses: read

on:
  schedule:
    - cron: '0 */3 * * *'   # A cada 3 horas
  workflow_dispatch:         # Execução manual

env:
  TZ: America/Sao_Paulo

jobs:
  monitor:
    name: "Verificar APIs"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      # =================================================================
      # INSTALAR jq (para processar JSON)
      # =================================================================
      - name: "📦 Instalar jq"
        run: sudo apt-get update && sudo apt-get install -y jq

      # =================================================================
      # VERIFICACAO DAS APIS
      # =================================================================
      - name: "🔍 Verificar API Calendario"
        id: check_calendario
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/calendario-app/prestadores \
            -H "x-token: ${{ secrets.API_TOKEN }}" \
            --max-time 10)
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: "🔍 Verificar API Tarefas"
        id: check_tarefas
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/tarefas-app/usuarios \
            -H "x-token: ${{ secrets.API_TOKEN_TAREFAS }}" \
            --max-time 10)
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: "🔍 Verificar Banco Neon"
        id: check_neon
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://web-apitarefas.up.railway.app/ \
            --max-time 10)
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      # =================================================================
      # RELATORIO
      # =================================================================
      - name: "📝 Criar Relatorio"
        id: relatorio
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')
          CAL_S="${{ steps.check_calendario.outputs.status }}"
          TAR_S="${{ steps.check_tarefas.outputs.status }}"
          NEO_S="${{ steps.check_neon.outputs.status }}"
          CAL_C="${{ steps.check_calendario.outputs.status_code }}"
          TAR_C="${{ steps.check_tarefas.outputs.status_code }}"
          NEO_C="${{ steps.check_neon.outputs.status_code }}"

          if [ "$CAL_S" == "ok" ]; then
            CAL_L="✅ Online"
            CAL_E="✅"
            CAL_D="OK"
          else
            CAL_L="❌ Offline"
            CAL_E="❌"
            CAL_D="ERRO"
          fi
          
          if [ "$TAR_S" == "ok" ]; then
            TAR_L="✅ Online"
            TAR_E="✅"
            TAR_D="OK"
          else
            TAR_L="❌ Offline"
            TAR_E="❌"
            TAR_D="ERRO"
          fi
          
          if [ "$NEO_S" == "ok" ]; then
            NEO_L="✅ Conectado"
            NEO_E="✅"
            NEO_D="OK"
          else
            NEO_L="❌ Desconectado"
            NEO_E="❌"
            NEO_D="ERRO"
          fi

          if [ "$CAL_S" != "ok" ] || [ "$TAR_S" != "ok" ] || [ "$NEO_S" != "ok" ]; then
            STATUS_GERAL="❌ FALHA DETECTADA"
            TITULO="🚨 ALERTA: Falha no Monitoramento"
          else
            STATUS_GERAL="✅ TUDO OK"
            TITULO="✅ Monitoramento OK"
          fi

          cat > report.md << EOF
          # 📊 Relatório de Monitoramento das APIs - Unimed RV
          
          ## 📅 Data: $TIMESTAMP
          
          | API | Status | Código HTTP |
          |-----|--------|-------------|
          | API Calendário | $CAL_L | $CAL_C |
          | API Tarefas | $TAR_L | $TAR_C |
          | Banco Neon | $NEO_L | $NEO_C |
          
          ## 📈 Resultado: $STATUS_GERAL
          
          ---
          🔄 Próxima verificação em 3 horas.
          EOF

          echo "status_geral=$STATUS_GERAL" >> $GITHUB_OUTPUT
          echo "titulo=$TITULO" >> $GITHUB_OUTPUT
          echo "cal_e=$CAL_E" >> $GITHUB_OUTPUT
          echo "tar_e=$TAR_E" >> $GITHUB_OUTPUT
          echo "neo_e=$NEO_E" >> $GITHUB_OUTPUT
          echo "cal_d=$CAL_D" >> $GITHUB_OUTPUT
          echo "tar_d=$TAR_D" >> $GITHUB_OUTPUT
          echo "neo_d=$NEO_D" >> $GITHUB_OUTPUT
          
          echo "📄 Relatório gerado:"
          echo "─────────────────────"
          cat report.md
          echo "─────────────────────"

      - name: "📤 Upload do Relatorio"
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report-${{ github.run_id }}
          path: report.md
          retention-days: 30

      # =================================================================
      # TELEGRAM
      # =================================================================
      - name: "📝 Preparar mensagem Telegram"
        id: prepare_msg
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')
          TITULO="${{ steps.relatorio.outputs.titulo }}"
          CAL_E="${{ steps.relatorio.outputs.cal_e }}"
          TAR_E="${{ steps.relatorio.outputs.tar_e }}"
          NEO_E="${{ steps.relatorio.outputs.neo_e }}"
          CAL_C="${{ steps.check_calendario.outputs.status_code }}"
          TAR_C="${{ steps.check_tarefas.outputs.status_code }}"
          NEO_C="${{ steps.check_neon.outputs.status_code }}"
          CAL_D="${{ steps.relatorio.outputs.cal_d }}"
          TAR_D="${{ steps.relatorio.outputs.tar_d }}"
          NEO_D="${{ steps.relatorio.outputs.neo_d }}"
          
          cat > /tmp/telegram_msg.txt << EOF
          $TITULO
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          
          📅 *Data:* $TIMESTAMP
          
          📊 *Status das APIs:*
          
          $CAL_E API Calendário: $CAL_D (HTTP $CAL_C)
          $TAR_E API Tarefas: $TAR_D (HTTP $TAR_C)
          $NEO_E Banco Neon: $NEO_D (HTTP $NEO_C)
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          
          🔄 *Próxima verificação em 3 horas.*
          EOF
          
          echo "✅ Mensagem preparada:"
          echo "─────────────────────"
          cat /tmp/telegram_msg.txt
          echo "─────────────────────"

      - name: "🔍 Verificar Token Telegram"
        id: check_token
        env:
          TELEGRAM_TOKEN: ${{ secrets.TOKEN_TELEGRAM }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ]; then
            echo "❌ TOKEN_TELEGRAM não configurado!"
            echo "token_ok=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.telegram.org/bot$TELEGRAM_TOKEN/getMe")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Token válido!"
            echo "token_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Token inválido! Código: $HTTP_CODE"
            echo "token_ok=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: "📨 Enviar notificacao Telegram"
        if: steps.check_token.outputs.token_ok == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ TELEGRAM_CHAT_ID não configurado!"
            exit 1
          fi
          
          echo "📤 Enviando notificação para Telegram..."
          
          MSG=$(cat /tmp/telegram_msg.txt)
          
          JSON_PAYLOAD=$(jq -n \
            --arg chat "$TELEGRAM_CHAT_ID" \
            --arg text "$MSG" \
            '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            --max-time 10)
          
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Notificação enviada com sucesso!"
          else
            echo "❌ Falha ao enviar notificação:"
            echo "$RESPONSE"
            
            # Tentativa sem Markdown
            echo "🔄 Tentando sem formatação Markdown..."
            JSON_PAYLOAD=$(jq -n \
              --arg chat "$TELEGRAM_CHAT_ID" \
              --arg text "$MSG" \
              '{chat_id: $chat, text: $text}')
            
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$JSON_PAYLOAD" \
              --max-time 10)
            
            if echo "$RESPONSE" | grep -q '"ok":true'; then
              echo "✅ Notificação enviada na segunda tentativa!"
            else
              echo "❌ Falha novamente:"
              echo "$RESPONSE"
            fi
          fi

      - name: "👥 Enviar para grupo Telegram"
        if: steps.check_token.outputs.token_ok == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        run: |
          if [ -z "$TELEGRAM_GROUP_ID" ]; then
            echo "ℹ️ Grupo não configurado, pulando"
            exit 0
          fi
          
          echo "📤 Enviando notificação para grupo..."
          
          MSG=$(cat /tmp/telegram_msg.txt)
          
          JSON_PAYLOAD=$(jq -n \
            --arg chat "$TELEGRAM_GROUP_ID" \
            --arg text "$MSG" \
            '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            --max-time 10)
          
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Notificação enviada para o grupo"
          else
            echo "❌ Falha ao enviar para o grupo:"
            echo "$RESPONSE"
          fi

      # =================================================================
      # ISSUE (APENAS SE FALHAR)
      # =================================================================
      - name: "📝 Preparar Issue com mensagem formatada"
        if: steps.check_calendario.outputs.status != 'ok' || steps.check_tarefas.outputs.status != 'ok' || steps.check_neon.outputs.status != 'ok'
        id: prepare_issue
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')
          
          CAL_S="${{ steps.check_calendario.outputs.status }}"
          TAR_S="${{ steps.check_tarefas.outputs.status }}"
          NEO_S="${{ steps.check_neon.outputs.status }}"
          CAL_C="${{ steps.check_calendario.outputs.status_code }}"
          TAR_C="${{ steps.check_tarefas.outputs.status_code }}"
          NEO_C="${{ steps.check_neon.outputs.status_code }}"
          
          if [ "$CAL_S" == "ok" ]; then
            CAL_ICON="✅"
            CAL_STATUS="Online"
          else
            CAL_ICON="❌"
            CAL_STATUS="Offline"
          fi
          
          if [ "$TAR_S" == "ok" ]; then
            TAR_ICON="✅"
            TAR_STATUS="Online"
          else
            TAR_ICON="❌"
            TAR_STATUS="Offline"
          fi
          
          if [ "$NEO_S" == "ok" ]; then
            NEO_ICON="✅"
            NEO_STATUS="Conectado"
          else
            NEO_ICON="❌"
            NEO_STATUS="Desconectado"
          fi
          
          FALHAS=""
          if [ "$CAL_S" != "ok" ]; then
            FALHAS="${FALHAS}- API Calendário (HTTP $CAL_C)\n"
          fi
          if [ "$TAR_S" != "ok" ]; then
            FALHAS="${FALHAS}- API Tarefas (HTTP $TAR_C)\n"
          fi
          if [ "$NEO_S" != "ok" ]; then
            FALHAS="${FALHAS}- Banco Neon (HTTP $NEO_C)\n"
          fi
          
          cat > /tmp/issue_body.md << EOF
          ## 🚨 Falha Detectada no Monitoramento
          
          **📅 Data:** $TIMESTAMP
          
          **📊 Status das APIs:**
          
          | API | Status | Código HTTP |
          |-----|--------|-------------|
          | API Calendário | $CAL_ICON $CAL_STATUS | \`$CAL_C\` |
          | API Tarefas | $TAR_ICON $TAR_STATUS | \`$TAR_C\` |
          | Banco Neon | $NEO_ICON $NEO_STATUS | \`$NEO_C\` |
          
          **❌ APIs com Falha:**
          
          $(echo -e "$FALHAS")
          
          ---
          
          ### 🔍 Detalhes da Falha
          
          - **Workflow:** ${{ github.workflow }}
          - **Run ID:** ${{ github.run_id }}
          - **Branch:** ${{ github.ref_name }}
          
          ### 📋 Logs da Execução
          
          [${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ### ⚡ Ação Necessária
          
          **Verificar as APIs que apresentaram falha:**
          
          1. **API Calendário:** \`https://web-apitarefas.up.railway.app/calendario-app/prestadores\`
          2. **API Tarefas:** \`https://web-apitarefas.up.railway.app/tarefas-app/usuarios\`
          3. **Banco Neon:** \`https://web-apitarefas.up.railway.app/\`
          
          **Possíveis causas:**
          - Token inválido ou expirado
          - API fora do ar
          - Problema de rede
          - Banco de dados indisponível
          
          ---
          
          **📊 Relatório Completo:**
          
          \`\`\`
          $(cat report.md)
          \`\`\`
          
          ---
          🔄 *Este issue foi criado automaticamente pelo GitHub Actions.*
          EOF

      - name: "📝 Criar Issue com mensagem formatada"
        if: steps.check_calendario.outputs.status != 'ok' || steps.check_tarefas.outputs.status != 'ok' || steps.check_neon.outputs.status != 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueBody = fs.readFileSync('/tmp/issue_body.md', 'utf8');
            const today = new Date().toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            const now = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring'
            });
            
            if (issues.length === 0) {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Falha no Monitoramento das APIs - ${today}`,
                body: issueBody,
                labels: ['monitoring', 'bug', 'automation-failed']
              });
              
              console.log(`✅ Issue criada com sucesso: #${issue.number}`);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⏱️ **Issue criada em:** ${now}\n\n🔗 **Link da execução:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              
            } else {
              console.log(`ℹ️ Já existe uma issue aberta para monitoramento: #${issues[0].number}`);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `🔄 **Nova falha detectada em:** ${now}\n\n📊 **Status atual:**\n\n${issueBody}\n\n🔗 **Link da execução:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              
              console.log(`✅ Comentário adicionado à issue #${issues[0].number}`);
            }