0name: 🚑 Monitoramento da API

on:
  schedule:
    # Executa a cada 5 minutos
    - cron: '*/5 * * * *'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

concurrency:
  group: monitor-api
  cancel-in-progress: true

jobs:
  health-check:
    name: 🔎 Verificar Status da API
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      # -------------------------------------------------------
      # 1. Verificar secrets
      # -------------------------------------------------------
      - name: 🔐 Verificar Secrets
        env:
          API_URL_TAREFAS: ${{ secrets.API_URL_TAREFAS }}
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for secret in API_URL_TAREFAS TOKEN_TELEGRAM TELEGRAM_CHAT_ID; do
            if [ -z "${!secret}" ]; then
              echo "❌ Secret $secret não configurado!"
              exit 1
            fi
          done

          echo "✅ Secrets verificados"

      # -------------------------------------------------------
      # 2. Testar API
      # -------------------------------------------------------
      - name: 🌐 Testar API
        id: health
        env:
          API_URL: ${{ secrets.API_URL_TAREFAS }}
        run: |

          echo "🔎 Testando API..."

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 10 \
            "$API_URL/health")

          echo "status=$STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" = "200" ]; then
            echo "✅ API está funcionando"
          else
            echo "❌ API retornou status $STATUS"
            exit 1
          fi

      # -------------------------------------------------------
      # 3. Enviar alerta Telegram se falhar
      # -------------------------------------------------------
      - name: 📩 Enviar alerta Telegram
        if: failure()
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |

          DATA=$(TZ=America/Sao_Paulo date)

          MESSAGE="🚨 *ALERTA: API FORA DO AR*

📅 Data: $DATA
⚠️ A API de tarefas não respondeu corretamente.

🔎 Verifique o servidor imediatamente."

          curl -s -X POST \
          "https://api.telegram.org/bot$TOKEN_TELEGRAM/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d text="$MESSAGE" \
          -d parse_mode="Markdown"

      # -------------------------------------------------------
      # 4. Criar issue automática
      # -------------------------------------------------------
      - name: 🐞 Criar Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |

            const data = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'api-down',
              state: 'open'
            });

            if (issues.data.length === 0) {

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 API fora do ar - ${data}`,
                body: `
A automação detectou que a API não respondeu corretamente.

Data/Hora: ${data}

Verifique o servidor da aplicação.

Run:
${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
`,
                labels: ['bug','api-down','monitoramento']
              });

            }