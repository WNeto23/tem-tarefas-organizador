name: 🤖 Notificar Tarefas - Tem Tarefas?

on:
  schedule:
    # Horários em UTC (GitHub usa UTC)
    # 11:00 UTC = 08:00 BRT
    - cron: '0 11 * * *'   # Resumo completo
    - cron: '0 12 * * *'   # Tarefas pendentes
    - cron: '0 16 * * *'   # Tarefas urgentes
    - cron: '0 19 * * *'   # Pendências da tarde
    - cron: '0 21 * * *'   # Resumo final

  workflow_dispatch: # execução manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

concurrency:
  group: notificador-tarefas
  cancel-in-progress: false

jobs:
  notificar-tarefas:
    name: 📋 Enviar Notificações de Tarefas
    runs-on: ubuntu-latest
    environment: producao
    timeout-minutes: 10

    steps:

      # ---------------------------------------------------------
      # 1. Verificar segredos obrigatórios
      # ---------------------------------------------------------
      - name: 🔍 Verificar Segredos Obrigatórios
        env:
          API_URL_TAREFAS: ${{ secrets.API_URL_TAREFAS }}
          API_TOKEN_TAREFAS: ${{ secrets.API_TOKEN_TAREFAS }}
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
        run: |
          echo "🔐 Verificando credenciais..."
          echo "🕐 Data/Hora UTC: $(date -u)"
          echo "🕐 BRT: $(TZ=America/Sao_Paulo date)"

          for secret in API_URL_TAREFAS API_TOKEN_TAREFAS TOKEN_TELEGRAM; do
            if [ -z "${!secret}" ]; then
              echo "❌ Secret $secret não configurado!"
              exit 1
            fi
          done

          echo "✅ Todos os segredos estão configurados!"

      # ---------------------------------------------------------
      # 2. Checkout do repositório
      # ---------------------------------------------------------
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ---------------------------------------------------------
      # 3. Configurar Python
      # ---------------------------------------------------------
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ---------------------------------------------------------
      # 4. Instalar dependências
      # ---------------------------------------------------------
      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ requirements.txt não encontrado, instalando dependências padrão..."
            pip install requests python-dotenv pytz
          fi

          echo "📋 Dependências instaladas:"
          pip list

      # ---------------------------------------------------------
      # 5. Executar notificador
      # ---------------------------------------------------------
      - name: 📋 Executar Notificador de Tarefas
        env:
          API_URL_TAREFAS: ${{ secrets.API_URL_TAREFAS }}
          API_TOKEN_TAREFAS: ${{ secrets.API_TOKEN_TAREFAS }}
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          TZ: America/Sao_Paulo
        run: |
          set -o pipefail

          echo "🚀 Iniciando notificador..."
          echo "🕐 Horário BRT: $(date)"

          HORARIO=$(date +%H)
          export HORARIO

          echo "⏰ Hora atual: $HORARIO"

          python scripts/notificador_tarefas.py | tee notificador_tarefas.log

          echo "✅ Script finalizado"

      # ---------------------------------------------------------
      # 6. Upload de logs
      # ---------------------------------------------------------
      - name: 📤 Upload de Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-notificacoes-tarefas-${{ github.run_id }}
          path: |
            *.log
          retention-days: 14
          if-no-files-found: warn

      # ---------------------------------------------------------
      # 7. Criar issue se falhar
      # ---------------------------------------------------------
      - name: 🔔 Criar Issue em Caso de Falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |

            const data = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automation-failed,tarefas',
              state: 'open'
            });

            if (issues.data.length === 0) {

              const title = `🚨 Falha na Notificação de Tarefas - ${data}`;

              const body = `
              ## ❌ Falha na automação de notificação de tarefas

              **Data/Hora:** ${data}

              **Workflow:** ${context.workflow}

              **Run ID:** ${context.runId}

              ### 📋 Logs da execução
              ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

              ### ⚡ Ação necessária
              Verifique os logs da execução e corrija o problema.
              `;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug','automation-failed','tarefas']
              });

            } else {
              console.log("⚠️ Já existe uma issue aberta para falha da automação.");
            }